name: Unit tests and benchmark run

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: >
    ${{ github.workflow }} @
    ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  ROS_DOMAIN_ID: 90
jobs:
  unit_tests:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Pre-build docker images
      run: |
        ./docker/run.sh --build -s unpatched_workspace -- true
        ./docker/run.sh --build -s patched_workspace -- true

    - name: Run unit tests
      run: |
        ./docker/run.sh -- bash -c '
          rm -rf build/* install/* &&
          . $ROS_CORE_WS/install/setup.bash &&
          colcon build &&
          colcon test &&
          colcon test-result --verbose
        '

    - name: Run vanilla benchmark
      run: |
        mkdir -p ${{ github.workspace }}/benchmark_results
        ./docker/run.sh -s unpatched_workspace -- bash -c '
          . $ROS_CORE_WS/install/setup.bash &&
          ros2 run performance_test perf_test -c rclcpp-single-threaded-executor -m Array1k -t test_topic -s 1 -p 1 --max-runtime 30 -l /home/developer/ws/src/project/benchmark_results/vanilla_results.json
        '

    - name: Run patched benchmark
      run: |
        mkdir -p ${{ github.workspace }}/benchmark_results
        ./docker/run.sh -s patched_workspace -- bash -c '
          . $ROS_CORE_WS/install/setup.bash &&
          ros2 run performance_test perf_test -c rclcpp-single-threaded-executor -m Array1k -t test_topic -s 1 -p 1 --max-runtime 30 -l /home/developer/ws/src/project/benchmark_results/patched_results.json
        '

    - name: Read vanilla benchmark results
      id: vanilla_results
      if: github.event_name == 'pull_request'
      run: |
        echo "results<<EOF" >> $GITHUB_OUTPUT
        python3 docker/scripts/parse_benchmark_results.py ${{ github.workspace }}/benchmark_results/vanilla_results.json >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Read patched benchmark results
      id: patched_results
      if: github.event_name == 'pull_request'
      run: |
        echo "results<<EOF" >> $GITHUB_OUTPUT
        python3 docker/scripts/parse_benchmark_results.py ${{ github.workspace }}/benchmark_results/patched_results.json >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Post benchmark results to PR
      if: >
        github.event_name == 'pull_request' &&
        steps.vanilla_results.outputs.results != '' &&
        steps.patched_results.outputs.results != ''
      uses: actions/github-script@v9
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## Performance benchmark results

          ### Vanilla (upstream Jazzy)
          \`\`\`
          ${{ steps.vanilla_results.outputs.results }}
          \`\`\`

          ### Patched (zero-copy overrides)
          \`\`\`
          ${{ steps.patched_results.outputs.results }}
          \`\`\`
          `
          })
