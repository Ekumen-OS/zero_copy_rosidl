name: Unit tests and benchmark run

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: >
    ${{ github.workflow }} @
    ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  ROS_DOMAIN_ID: 90
jobs:
  unit_tests:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Pre-build of the docker image
      run: ./docker/run.sh --build -- true

    - name: Run unit tests
      run: |
        ./docker/run.sh --build -- bash -c '
          rm -rf build/* install/* &&
          . /opt/ros/jazzy/setup.bash &&
          colcon build &&
          colcon test
        '

    - name: Run benchmark
      run: |
        ./docker/run.sh --build -- bash -c '
          . install/setup.bash &&
          cd ./install/irobot_benchmark/lib/irobot_benchmark &&
          ./irobot_benchmark topology/sierra_nevada.json &&
          cat sierra_nevada_log/latency_total.txt > /tmp/benchmark_results.txt
        '

    - name: Read benchmark results
      id: benchmark_results
      if: github.event_name == 'pull_request'
      run: |
        if [ -f /tmp/benchmark_results.txt ]; then
          echo "results<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/benchmark_results.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi

    - name: Post benchmark results to PR
      if: >
        github.event_name == 'pull_request' &&
        steps.benchmark_results.outputs.results != ''
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## Latency total benchmark results

          \`\`\`
          ${{ steps.benchmark_results.outputs.results }}
          \`\`\`
          `
          })
