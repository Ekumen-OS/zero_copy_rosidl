x-base-workspace: &base-workspace
  stdin_open: true
  tty: true
  user: ${USERID:-1000}:${GROUPID:-1000}
  volumes:
    - ..:/home/developer/ws/src/project
    - /tmp:/tmp:rw
    - zero_rosidl_persistence:/home/developer/ws/persistence

services:
  unpatched_workspace:
    <<: *base-workspace
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: unpatched_workspace
      args:
        UID: ${USERID:-1000}
        GID: ${GROUPID:-1000}

  patched_workspace:
    <<: *base-workspace
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: patched_workspace
      args:
        UID: ${USERID:-1000}
        GID: ${GROUPID:-1000}

volumes:
  zero_rosidl_persistence:
