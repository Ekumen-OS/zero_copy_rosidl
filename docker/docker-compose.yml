services:
  unpatched_workspace:
    stdin_open: true
    tty: true
    user: ${USERID:-1000}:${GROUPID:-1000}
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=${XAUTHORITY:-/tmp/.docker.xauth}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-90}
    volumes:
      - ..:/home/developer/ws/src/project
      - /tmp:/tmp:rw
      - zero_rosidl_ccache:/home/developer/.ccache
    build:
      context: ..
      dockerfile: docker/Dockerfile.jazzy
      target: unpatched_workspace
      args:
        UID: ${USERID:-1000}
        GID: ${GROUPID:-1000}

  patched_workspace:
    extends:
      service: unpatched_workspace
    build:
      target: patched_workspace

  dev_workspace:
    extends:
      service: unpatched_workspace
    volumes:
      - zero_rosidl_dev_build:/home/developer/ws_ros_core/build
      - zero_rosidl_dev_install:/home/developer/ws_ros_core/install
    # After modifying core_overrides/, run rebuild_ros.sh from inside the container.

volumes:
  zero_rosidl_ccache:
  zero_rosidl_dev_build:
  zero_rosidl_dev_install:
